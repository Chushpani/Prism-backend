<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <title>NAZVA</title>
</head>
<body>
    <header><p>Монитор подписок</p></header>


    <!-- Модалка ЛОГИН -->
<div id="login-overlay">
  <div class="modal">
    <h2>Вход в аккаунт</h2>
    <form id="login-form">
      <input type="email" name="email" placeholder="Email" required />
      <input type="password" name="password" placeholder="Пароль" required minlength="6" />
      <button type="submit">Войти</button>
    </form>
    <button type="button" id="open-register">Регистрация</button>
  </div>
</div>

<!-- Модалка РЕГИСТРАЦИЯ -->
<div id="register-overlay">
  <div class="modal">
    <h2>Регистрация</h2>
    <form id="register-form">
      <input type="email" name="email" placeholder="Email" required />
      <input type="password" name="password" placeholder="Пароль" required minlength="6" />
      <input type="password" name="confirm-password" placeholder="Подтверждение пароля" required />
      <input type="password" name="app-password" placeholder="Пароль доступа приложений" required />
      <button type="submit">Подтвердить</button>
    </form>
    <button type="button" id="back-to-login">Уже есть аккаунт?<br> Войти</button>
  </div>
</div>

    <script src="index.js"></script>
</body>
</html>
